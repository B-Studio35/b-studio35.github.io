```html
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>B Studio Store | Özellikler</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        :root{
            --bg:#090909;
            --card:#141414;
            --border:#262626;
            --text:#ffffff;
            --text2:#9e9e9e;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:var(--bg);
            color:var(--text);
            font-family:Segoe UI, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            overflow:hidden;
        }

        .background-glow{
            position:absolute;
            width:500px;
            height:500px;
            background:white;
            opacity:0.03;
            filter:blur(120px);
            border-radius:50%;
        }

        .card{
            position:relative;
            width:90%;
            max-width:500px;
            background:rgba(20,20,20,0.95);
            border:1px solid var(--border);
            border-radius:30px;
            padding:50px 40px;
            text-align:center;
            backdrop-filter:blur(10px);
            z-index:2;
        }

        .logo{
            width:110px;
            margin-bottom:25px;
            filter:drop-shadow(0 0 20px rgba(255,255,255,0.15));
        }

        h1{
            font-size:3rem;
            margin-bottom:15px;
            letter-spacing:1px;
        }

        .subtitle{
            color:var(--text2);
            line-height:1.7;
            margin-bottom:35px;
            font-size:1.05rem;
        }

        .features{
            display:flex;
            justify-content:center;
            gap:15px;
            flex-wrap:wrap;
            margin-bottom:40px;
        }

        .feature{
            background:#1d1d1d;
            border:1px solid #2a2a2a;
            padding:10px 18px;
            border-radius:14px;
            color:#d6d6d6;
            font-size:0.95rem;
        }

        .download-btn{
            display:inline-flex;
            align-items:center;
            gap:12px;
            background:white;
            color:black;
            text-decoration:none;
            padding:18px 38px;
            border-radius:18px;
            font-size:1.1rem;
            font-weight:700;
            transition:0.25s;
        }

        .download-btn:hover{
            transform:translateY(-5px);
            box-shadow:0 0 30px rgba(255,255,255,0.18);
        }

        .version{
            margin-top:25px;
            color:#777;
            font-size:0.9rem;
        }

        @media(max-width:600px){

            h1{
                font-size:2.3rem;
            }

            .card{
                padding:40px 25px;
            }

        }

    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="card">

        <!-- Logo -->
        <img src="logo.png" class="logo">

        <h1>B Store</h1>

        <p class="subtitle">
            Modern, hızlı ve sade uygulama mağazası.
            Tüm uygulamalarını tek yerden kolayca indir.
        </p>

        <div class="features">

            <div class="feature">
                <i class="fa-solid fa-bolt"></i>
                Hızlı
            </div>

            <div class="feature">
                <i class="fa-solid fa-shield"></i>
                Güvenli
            </div>

            <div class="feature">
                <i class="fa-solid fa-layer-group"></i>
                Modern
            </div>

        </div>

        <!-- DOWNLOAD -->
        <a href="https://raw.githubusercontent.com/B-Studio35/B-Store/main/B Store" class="download-btn" download>
            <i class="fa-solid fa-download"></i>
            B Store İndir
        </a>

        <div class="version">
            Version 1.4
        </div>

    </div>

</body>
</html>
```
