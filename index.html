<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B Studio | Official</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            color: #0078d4;
            font-size: 4rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.2rem;
            color: #aaaaaa;
            margin-bottom: 30px;
        }
        .btn {
            background-color: #0078d4;
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            border: 2px solid transparent;
        }
        .btn:hover {
            background-color: transparent;
            border-color: #0078d4;
            box-shadow: 0 0 20px #0078d4;
        }
        .status {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>B STUDIO</h1>
    <p>Yazılım, Tasarım ve İçerik Üretim Merkezi</p>
    <a href="#" class="btn">B UPDATER İNDİR (V1.0)</a>
    <div class="status">Sistem Durumu: Çevrimiçi | İzmir, Bornova</div>
</body>
</html>
